<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 340px;
            min-height: 200px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f0f0f;
            color: #fff;
            padding: 16px;
        }

        h1 { font-size: 18px; font-weight: 800; text-align: center; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #666; font-size: 11px; margin-bottom: 16px; }

        .upload-area {
            border: 2px dashed #333;
            border-radius: 12px;
            padding: 28px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .upload-area:hover, .upload-area.dragover { border-color: #3b82f6; background: #111; }
        .upload-area.has-image { padding: 8px; border-style: solid; border-color: #2a2a2a; }
        .upload-icon { font-size: 28px; margin-bottom: 6px; }
        .upload-text { color: #888; font-size: 12px; }
        .upload-text strong { color: #ccc; }
        .upload-preview { max-width: 100%; max-height: 140px; border-radius: 8px; }
        .change-text { color: #555; font-size: 10px; margin-top: 4px; }
        #fileInput { display: none; }
        .paste-hint { color: #444; font-size: 10px; text-align: center; margin-bottom: 12px; }

        .loading { display: none; text-align: center; padding: 16px 0; }
        .loading.visible { display: block; }
        .loading-text { color: #3b82f6; font-size: 12px; margin-bottom: 6px; }
        .progress-bar { width: 100%; height: 3px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
        .progress-fill { width: 60px; height: 100%; background: #3b82f6; border-radius: 2px; animation: slide 1s ease-in-out infinite; }
        @keyframes slide { 0% { transform: translateX(-60px); } 100% { transform: translateX(340px); } }

        .results { display: none; }
        .results.visible { display: block; }
        .result-image { width: 100%; border-radius: 8px; margin-bottom: 12px; }

        .section-title { font-size: 13px; font-weight: 700; color: #555; margin: 14px 0 8px; text-transform: uppercase; letter-spacing: 1px; }

        /* 스타일 게이지 */
        .gauge { display: flex; align-items: center; margin-bottom: 5px; }
        .gauge-name { width: 86px; font-size: 10px; font-weight: 700; color: #aaa; }
        .gauge-bar-bg { flex: 1; height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin: 0 6px; }
        .gauge-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
        .gauge-score { width: 30px; text-align: right; font-size: 10px; color: #666; }

        /* 분석 카드 */
        .analysis-card {
            background: #151515;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .analysis-label { font-size: 11px; font-weight: 700; margin-bottom: 4px; }
        .analysis-text { font-size: 12px; color: #aaa; line-height: 1.6; }

        /* 컬러 팔레트 */
        .palette { display: flex; gap: 4px; margin-top: 4px; }
        .palette-swatch {
            width: 28px; height: 28px; border-radius: 6px;
            border: 1px solid #333; cursor: pointer; position: relative;
        }
        .palette-swatch:hover::after {
            content: attr(data-hex);
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; font-size: 9px; padding: 2px 6px;
            border-radius: 4px; white-space: nowrap;
        }

        /* 키워드 */
        .keywords { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
        .keyword { background: #1a1a1a; border-radius: 4px; padding: 3px 8px; font-size: 10px; color: #888; }

        .retry-btn {
            display: block; width: 100%; padding: 10px;
            background: #1a1a1a; color: #888; border: 1px solid #2a2a2a;
            border-radius: 8px; font-size: 12px; font-weight: 600;
            cursor: pointer; margin-top: 14px; transition: all 0.2s;
        }
        .retry-btn:hover { background: #222; color: #fff; }
    </style>
</head>
<body>

<h1>Font Catcher</h1>
<p class="subtitle">이미지를 올리면 폰트를 찾아드려요</p>

<div class="upload-area" id="uploadArea">
    <div id="uploadContent">
        <div class="upload-icon">🔍</div>
        <div class="upload-text"><strong>이미지를 드래그</strong>하거나 클릭</div>
    </div>
</div>
<p class="paste-hint">Cmd+V 붙여넣기 · 스크린샷 붙여넣기 가능</p>
<input type="file" id="fileInput" accept="image/*">

<div class="loading" id="loading">
    <div class="loading-text" id="loadingText">폰트 분석 중...</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
</div>

<div class="results" id="results"></div>

<script src="popup.js"></script>
</body>
</html>
