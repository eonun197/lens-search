// ===== 폰트 로드 (배치로) =====
let fontsLoaded = false;
async function loadGoogleFonts(maxFonts, onProgress) {
    if (fontsLoaded) return;

    const fonts = GOOGLE_FONTS.slice(0, maxFonts);
    const BATCH = 50;

    for (let i = 0; i < fonts.length; i += BATCH) {
        const batch = fonts.slice(i, i + BATCH);
        const families = batch.map(f => f.css + ':wght@400').join('&family=');
        const link = document.createElement('link');
        link.href = `https://fonts.googleapis.com/css2?family=${families}&display=swap`;
        link.rel = 'stylesheet';
        document.head.appendChild(link);

        if (onProgress) onProgress(Math.min(i + BATCH, fonts.length), fonts.length);
        await new Promise(r => setTimeout(r, 300));
    }

    await new Promise(r => setTimeout(r, 1500)); // 마지막 배치 로드 대기
    fontsLoaded = true;
}

let uploadedImageSrc = null;
let preprocessedImageSrc = null;

// ===== 이미지 전처리 =====
function preprocessImage(dataUrl) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // 1. 그레이스케일
            const grays = [];
            let totalBri = 0;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                grays.push(gray);
                totalBri += gray;
            }
            const avgBri = totalBri / grays.length;
            const needInvert = avgBri < 128;

            // 2. 오츠 이진화
            const histogram = new Array(256).fill(0);
            for (const g of grays) histogram[Math.round(g)]++;
            let sum = 0, sumB = 0, wB = 0, maxVar = 0, threshold = 128;
            for (let i = 0; i < 256; i++) sum += i * histogram[i];
            for (let t = 0; t < 256; t++) {
                wB += histogram[t]; if (wB === 0) continue;
                const wF = grays.length - wB; if (wF === 0) break;
                sumB += t * histogram[t];
                const v = wB * wF * Math.pow(sumB/wB - (sum-sumB)/wF, 2);
                if (v > maxVar) { maxVar = v; threshold = t; }
            }

            // 3. 적용
            for (let i = 0; i < grays.length; i++) {
                const val = needInvert ? (grays[i] < threshold ? 255 : 0) : (grays[i] > threshold ? 255 : 0);
                const pi = i * 4;
                data[pi] = data[pi+1] = data[pi+2] = val;
                data[pi+3] = 255;
            }
            ctx.putImageData(imageData, 0, 0);

            // 4. 대비 강화
            const sharpCanvas = document.createElement('canvas');
            sharpCanvas.width = canvas.width;
            sharpCanvas.height = canvas.height;
            const sCtx = sharpCanvas.getContext('2d');
            sCtx.filter = 'contrast(1.5)';
            sCtx.drawImage(canvas, 0, 0);

            resolve(sharpCanvas.toDataURL('image/png'));
        };
        img.src = dataUrl;
    });
}

// ===== 이미지 업로드 + 로컬 OCR =====
function handleImage(file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
        uploadedImageSrc = e.target.result;
        uploadArea.classList.add('has-image');
        document.getElementById('uploadContent').innerHTML =
            `<img src="${uploadedImageSrc}" class="upload-preview"><div class="change-text">클릭하여 변경</div>`;
        document.getElementById('results').classList.remove('visible');

        const stepSection = document.getElementById('stepSection');
        const stepLabel = document.getElementById('stepLabel');
        const stepHint = document.getElementById('stepHint');
        const textInput = document.getElementById('textInput');

        stepSection.classList.add('visible');
        stepLabel.textContent = '텍스트를 인식하고 있어요...';
        stepHint.textContent = '잠시만 기다려주세요';
        textInput.value = '';
        textInput.disabled = true;
        document.getElementById('analyzeBtn').disabled = true;

        // 전처리
        preprocessedImageSrc = await preprocessImage(uploadedImageSrc);

        // Tesseract.js 로컬 OCR
        try {
            const result = await Tesseract.recognize(preprocessedImageSrc, 'eng+kor', {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        stepHint.textContent = `인식 중... ${Math.round(m.progress * 100)}%`;
                    }
                }
            });
            const detected = result.data.text.trim().replace(/\n/g, ' ');
            if (detected.length > 0) {
                textInput.value = detected;
                stepLabel.textContent = '이 텍스트가 맞나요?';
                stepHint.textContent = '틀리면 수정해주세요';
            } else {
                stepLabel.textContent = '이미지에 적힌 텍스트를 입력해주세요';
                stepHint.textContent = '텍스트를 찾지 못했어요';
            }
        } catch (err) {
            stepLabel.textContent = '이미지에 적힌 텍스트를 입력해주세요';
            stepHint.textContent = '인식에 실패했어요. 직접 입력해주세요.';
        }

        textInput.disabled = false;
        textInput.focus();
        document.getElementById('analyzeBtn').disabled = textInput.value.trim().length === 0;
    };
    reader.readAsDataURL(file);
}

async function analyzeWithCloudflare(imageBase64, confirmedText) {
    const textHint = confirmedText ? `이 이미지의 텍스트는 "${confirmedText}"야.` : '';

    const prompt = `You are a world-class typography expert. ${textHint} Identify the exact font in this image.

IMPORTANT RULES:
- FONT_NAME must be a REAL, EXISTING font name. Never invent names.
- Look carefully at: serif vs sans-serif, stroke contrast, letter shapes (a, g, e, R), terminals, x-height.
- "Sans-serif" is a CATEGORY, not a font name. Never put it as FONT_NAME.
- "Monospace" means fixed-width like Courier. Most fonts are NOT monospace.

Common fonts to consider:
Sans-serif: SF Pro, Helvetica Neue, Arial, Futura, Avenir, Gotham, Proxima Nova, Roboto, Inter, Montserrat, Poppins, DM Sans, Pretendard, Noto Sans
Serif: Times New Roman, Garamond, Bodoni, Libre Bodoni, Baskerville, Georgia, Playfair Display, Noto Serif, Merriweather
Korean: Sandoll Gothic Neo, Pretendard, Noto Sans KR, NanumGothic, Apple SD Gothic Neo, Noto Serif KR, NanumMyeongjo, Sandoll Myungjo Neo, Maruburi

Answer in this EXACT format only:
FONT_NAME: (one specific real font name)
SIMILAR_FONTS: font1, font2, font3
CLASSIFICATION: (serif/sans-serif/script/display/monospace)
WEIGHT: (Thin/Light/Regular/Medium/Bold/Black)
FEATURES: (이 폰트의 시각적 특징을 한국어로 한 줄)
MOOD: (이 폰트가 주는 감정/인상을 한국어로 — 따뜻한/차가운, 모던한/클래식한, 캐주얼한/격식있는, 고급스러운/친근한 등)
USE_CASE: (이 폰트가 어울리는 구체적 사용처를 한국어로 — 포스터 제목, 앱 UI, 카페 메뉴판, 명함, 패션 잡지, 책 본문 등)
PAIR_WITH: (이 폰트와 잘 어울리는 1~2개 폰트 조합을 한국어로)
SUGGEST_SERVICE: (폰트 이름에 확신이 없다면 다음 중 하나를 추천하고 이유를 한국어로 설명: WhatTheFont|이유, Font Squirrel|이유, DaFont|이유, Adobe Fonts|이유, 산돌구름|이유. 확신이 있으면 none)`;

    const resp = await fetch('https://font-catcher.eonun197.workers.dev/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            messages: [{
                role: 'user',
                content: [
                    { type: 'text', text: prompt },
                    { type: 'image_url', image_url: { url: 'data:image/png;base64,' + imageBase64 } }
                ]
            }],
            temperature: 0,
            max_tokens: 500
        })
    });

    if (!resp.ok) throw new Error('AI 분석 실패');
    const data = await resp.json();
    if (!data.success) throw new Error('AI 응답 실패');
    return data.result.response;
}

async function startAnalysis() {
    const text = document.getElementById('textInput').value.trim();
    if (!text) return;

    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const stepSection = document.getElementById('stepSection');
    stepSection.classList.remove('visible');
    loading.classList.add('visible');
    results.classList.remove('visible');

    // 단계별 로딩
    const steps = [
        { text: '이미지 전송 중...', pct: 15 },
        { text: '대비 강화 중...', pct: 30 },
        { text: '형태 선명도 높이는 중...', pct: 45 },
        { text: '폰트 특징 분석 중...', pct: 60 },
        { text: 'AI가 폰트를 찾는 중...', pct: 80 },
    ];
    let stepIdx = 0;
    const stepInterval = setInterval(() => {
        if (stepIdx < steps.length) {
            document.getElementById('loadingStep').textContent = steps[stepIdx].text;
            document.getElementById('glowBar').style.width = steps[stepIdx].pct + '%';
            stepIdx++;
        }
    }, 800);

    try {
        const base64 = uploadedImageSrc.split(',')[1];
        const aiResult = await analyzeWithCloudflare(base64, text);
        clearInterval(stepInterval);
        document.getElementById('glowBar').style.width = '100%';
        document.getElementById('loadingStep').textContent = '완료!';
        await new Promise(r => setTimeout(r, 300));
        loading.classList.remove('visible');
        showResults(aiResult, text, 'ai');
    } catch (e) {
        clearInterval(stepInterval);
        document.getElementById('loadingStep').textContent = '픽셀 비교로 전환 중...';
        await runPixelComparison(text);
    }
}

// ===== 픽셀 비교 (폴백) =====
async function runPixelComparison(text) {
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');

    const MAX_FONTS = GOOGLE_FONTS.length;
    document.getElementById('loadingStep').textContent = `${MAX_FONTS}개 폰트 로딩 중...`;
    await loadGoogleFonts(MAX_FONTS, (loaded, total) => {
        document.getElementById('loadingStep').textContent = `폰트 로딩 중... (${loaded}/${total})`;
        document.getElementById('glowBar').style.width = (loaded / total * 30) + '%';
    });

    document.getElementById('loadingStep').textContent = '이미지와 비교하는 중...';
    const originalPixels = await getImagePixels(preprocessedImageSrc);

    const scores = [];
    const total = GOOGLE_FONTS.length;
    for (let i = 0; i < total; i++) {
        const font = GOOGLE_FONTS[i];
        const similarity = compareWithFont(originalPixels, text, font.name);
        scores.push({ ...font, score: similarity });
        if (i % 20 === 0) {
            document.getElementById('glowBar').style.width = (30 + Math.round((i/total)*70)) + '%';
            document.getElementById('loadingStep').textContent = `폰트 비교 중... (${i}/${total})`;
            await new Promise(r => setTimeout(r, 0));
        }
    }

    scores.sort((a, b) => b.score - a.score);
    loading.classList.remove('visible');
    showResultsPixel(scores.slice(0, 5), text, total);
}

function getImagePixels(dataUrl) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const size = 200;
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');

            // 이미지를 정사각형으로 맞춤
            const scale = Math.min(size / img.width, size / img.height);
            const w = img.width * scale, h = img.height * scale;
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, size, size);
            ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);

            // 이진화
            const imageData = ctx.getImageData(0, 0, size, size);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                const val = gray > 128 ? 255 : 0;
                data[i] = data[i+1] = data[i+2] = val;
            }
            ctx.putImageData(imageData, 0, 0);

            resolve({ canvas, ctx, size });
        };
        img.src = dataUrl;
    });
}

function compareWithFont(originalPixels, text, fontName) {
    const size = originalPixels.size;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');

    // 폰트로 렌더링
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // 텍스트 크기 자동 조절
    let fontSize = 60;
    ctx.font = `${fontSize}px "${fontName}"`;
    let metrics = ctx.measureText(text);
    while (metrics.width > size * 0.85 && fontSize > 12) {
        fontSize -= 2;
        ctx.font = `${fontSize}px "${fontName}"`;
        metrics = ctx.measureText(text);
    }

    ctx.fillText(text, size / 2, size / 2);

    // 이진화
    const imageData = ctx.getImageData(0, 0, size, size);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        data[i] = data[i+1] = data[i+2] = gray > 128 ? 255 : 0;
    }

    // 원본과 비교
    const origData = originalPixels.ctx.getImageData(0, 0, size, size).data;
    let match = 0, totalPx = 0;

    for (let i = 0; i < data.length; i += 4) {
        // 검은 픽셀(글자)만 비교
        if (origData[i] === 0 || data[i] === 0) {
            totalPx++;
            if (origData[i] === data[i]) match++;
        }
    }

    return totalPx > 0 ? (match / totalPx) * 100 : 0;
}

    const isDecorative = !fontName || (classification && (classification.toLowerCase().includes('script') || classification.toLowerCase().includes('display')));

    if (isKorean) {
        return '한글 폰트를 찾고 계시네요. <a href="https://noonnu.cc/" target="_blank" style="color:#3b82f6;font-weight:600;">눈누</a>에서 분위기별로 비슷한 한글 폰트를 탐색해보세요.';
    } else if (isDecorative) {
        return '장식적인 느낌의 폰트네요. <a href="https://www.dafont.com/" target="_blank" style="color:#3b82f6;font-weight:600;">DaFont</a>에서 다양한 장식체/디스플레이 폰트를 찾아보세요.';
    } else {
        return '비슷한 느낌의 영문 폰트를 <a href="https://fonts.google.com/" target="_blank" style="color:#3b82f6;font-weight:600;">Google Fonts</a>에서 카테고리별로 탐색해보세요.';
    }
}

function bindRetry() {
    document.getElementById('retryBtn').addEventListener('click', () => {
        document.getElementById('results').classList.remove('visible');
        uploadArea.classList.remove('has-image');
        document.getElementById('uploadContent').innerHTML =
            `<div class="upload-icon">🔍</div><div class="upload-text"><strong>이미지를 드래그</strong>하거나 클릭해서 업로드</div>`;
        document.getElementById('stepSection').classList.remove('visible');
        document.getElementById('textInput').value = '';
    });
}
</script>
