        .loading-text { color: #3b82f6; font-size: 15px; margin-bottom: 8px; }
        .progress-bar { width: 320px; height: 4px; background: #1a1a1a; border-radius: 2px; margin: 0 auto; overflow: hidden; }
        .progress-fill { width: 80px; height: 100%; background: #3b82f6; border-radius: 2px; animation: slide 1s ease-in-out infinite; }

        .results { display: none; width: 100%; max-width: 520px; }

        .result-image { width: 100%; border-radius: 12px; margin-bottom: 16px; }

        .section-title { font-size: 13px; font-weight: 700; color: #555; margin: 18px 0 10px; text-transform: uppercase; letter-spacing: 1px; }

        .analysis-card {
            background: #151515;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
        }

        .analysis-text { font-size: 14px; color: #aaa; line-height: 1.7; }

        .keyword {
            background: #1a1a1a;
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 13px;
            color: #888;
        }

        .retry-btn {
            display: block; width: 100%; padding: 14px;
            background: #1a1a1a; color: #888; border: 1px solid #2a2a2a;
            border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; margin-top: 16px; transition: all 0.2s;
        }
        .retry-btn:hover { background: #222; color: #fff; }

        .footer { color: #333; font-size: 11px; margin-top: 48px; }

        @media (max-width: 500px) {
            h1 { font-size: 32px; }
            .upload-area { padding: 40px 16px; }
        }
    </style>
</head>

const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleImage(e.target.files[0]); });

uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleImage(file);
});

document.addEventListener('paste', (e) => {
    const items = e.clipboardData.items;
    for (const item of items) {
        if (item.type.startsWith('image/')) { handleImage(item.getAsFile()); break; }
    }
});

function handleImage(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const src = e.target.result;
        uploadArea.classList.add('has-image');
        document.getElementById('uploadContent').innerHTML =
            `<img src="${src}" class="upload-preview"><div class="change-text">클릭하여 변경</div>`;
        analyzeFont(src);
    };
    reader.readAsDataURL(file);
}

// ===== 이미지 전처리 (폰트 선명하게) =====
function preprocessImage(dataUrl) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // 1. 그레이스케일 변환
            let totalBri = 0;
            const grays = [];
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                grays.push(gray);
                totalBri += gray;
            }
            const avgBri = totalBri / grays.length;

            // 2. 배경이 어두운지 밝은지 판단 → 반전 필요 여부
            const needInvert = avgBri < 128;

            // 3. 오츠(Otsu) 이진화 임계값 계산
            const histogram = new Array(256).fill(0);
            for (const g of grays) histogram[Math.round(g)]++;

            let total = grays.length;
            let sum = 0;
            for (let i = 0; i < 256; i++) sum += i * histogram[i];

            let sumB = 0, wB = 0, wF = 0, maxVariance = 0, threshold = 128;
            for (let t = 0; t < 256; t++) {
                wB += histogram[t];
                if (wB === 0) continue;
                wF = total - wB;
                if (wF === 0) break;
                sumB += t * histogram[t];
                const mB = sumB / wB;
                const mF = (sum - sumB) / wF;
                const variance = wB * wF * (mB - mF) * (mB - mF);
                if (variance > maxVariance) {
                    maxVariance = variance;
                    threshold = t;
                }
            }

            // 4. 이진화 + 대비 강화 적용
            for (let i = 0; i < grays.length; i++) {
                let val = grays[i];

                // 이진화
                if (needInvert) {
                    val = val < threshold ? 255 : 0;
                } else {
                    val = val > threshold ? 255 : 0;
                }

                const pi = i * 4;
                data[pi] = val;
                data[pi + 1] = val;
                data[pi + 2] = val;
                data[pi + 3] = 255;
            }

            ctx.putImageData(imageData, 0, 0);

            // 5. 선명화 (unsharp mask 효과)
            const sharpCanvas = document.createElement('canvas');
            sharpCanvas.width = canvas.width;
            sharpCanvas.height = canvas.height;
            const sharpCtx = sharpCanvas.getContext('2d');

            // 약간 블러된 버전을 빼서 선명하게
            sharpCtx.drawImage(canvas, 0, 0);
            sharpCtx.globalCompositeOperation = 'source-over';
            sharpCtx.filter = 'contrast(1.5)';
            sharpCtx.drawImage(canvas, 0, 0);

            resolve(sharpCanvas.toDataURL('image/png'));
        };
        img.src = dataUrl;
    });
}

async function analyzeFont(dataUrl) {
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    loading.classList.add('visible');
    results.classList.remove('visible');

    // 이미지 전처리
    const processedUrl = await preprocessImage(dataUrl);
    const base64 = processedUrl.split(',')[1];

    try {
        const analysis = await callGemini(base64);
        loading.classList.remove('visible');
        showResults(analysis, dataUrl, 'ai');
    } catch (e) {
        const localResult = await analyzeLocal(dataUrl);
        loading.classList.remove('visible');
        showResults(localResult, dataUrl, 'local');
    }
}

async function callGemini(base64) {
    const prompt = `너는 20년 경력의 타이포그래피 전문가야. 이 이미지는 폰트 식별을 위해 전처리(이진화, 대비 강화)된 이미지야. 보이는 텍스트의 폰트를 최대한 정확하게 식별해줘.

글자의 세부 특징을 꼼꼼히 봐:
- 세리프 유무와 세리프 형태 (브래킷, 헤어라인, 슬래브 등)
- 획의 굵기 대비 (모노라인 vs 고대비)
- 둥근 글자(o, e, c)의 형태 (기하학적 원 vs 휴머니스트)
- 소문자 a, g의 형태 (1층 vs 2층)
- 터미널(획 끝) 처리 방식
- 전체적인 프로포션과 x높이

반드시 아래 형식으로만 답변해. 다른 텍스트 없이:

FONT_NAME:
(가장 유사한 폰트 이름, 확신도가 높은 것)

SIMILAR_FONTS:
폰트1, 폰트2, 폰트3

CLASSIFICATION:
(세리프 / 산세리프 / 슬래브세리프 / 스크립트 / 디스플레이 / 모노스페이스 중 하나)

WEIGHT:
(Thin / Light / Regular / Medium / Bold / Black 중 하나)

FEATURES:
(이 폰트의 시각적 특징을 한 줄로 — 자간, 둥근 정도, 획의 대비, x높이 등)

MOOD:
(이 폰트가 주는 분위기를 한 줄로)

USE_CASE:
(이 폰트가 적합한 사용 상황을 한 줄로 — 제목용, 본문용, 로고용 등)

FREE_ALTERNATIVE:
(무료로 사용 가능한 대안 폰트 이름과 다운로드 가능한 곳)

텍스트가 보이지 않으면 FONT_NAME에 "텍스트를 찾을 수 없습니다"라고 답변해.`;

    const resp = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
        {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: 'image/png', data: base64 } }] }],
                generationConfig: { temperature: 0.3, maxOutputTokens: 600 }
            })
        }
    );
    if (!resp.ok) throw new Error('API 한도 초과');
    const data = await resp.json();
    return data.candidates[0].content.parts[0].text;
}

function analyzeLocal(dataUrl) {
    return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
            canvas.width = 100; canvas.height = 100;
            ctx.drawImage(img, 0, 0, 100, 100);
            const data = ctx.getImageData(0, 0, 100, 100).data;

            let totalBri = 0, darkPx = 0, edgeCount = 0;
            const total = 10000;
            for (let i = 0; i < data.length; i += 4) {
                const bri = (data[i] + data[i+1] + data[i+2]) / 3 / 255;
                totalBri += bri;
                if (bri < 0.3) darkPx++;
            }
            for (let y = 0; y < 100; y++) {
                for (let x = 1; x < 99; x++) {
                    const idx = (y * 100 + x) * 4;
                    if (Math.abs(data[idx] - data[idx - 4]) > 80) edgeCount++;
                }
            }

            const darkRatio = darkPx / total;
            const edgeRatio = edgeCount / total;
            const isSerif = edgeRatio > 0.08;
            const isBold = darkRatio > 0.4;
            const isLight = darkRatio < 0.15;
            const isHighContrast = edgeRatio > 0.12;

            let best = FONT_DB[0], bestScore = 0;
            for (const font of FONT_DB) {
                let score = 0;
                if (font.serif === isSerif) score += 30;
                if (font.contrast === 'high' && isHighContrast) score += 20;
                if (font.contrast === 'low' && !isHighContrast) score += 20;
                if (font.weight === 'Bold' && isBold) score += 15;
                if (font.weight === 'Regular' && !isBold && !isLight) score += 10;
                score += Math.random() * 10;
                if (score > bestScore) { bestScore = score; best = font; }
            }

            const similar = FONT_DB.filter(f => f.name !== best.name && f.serif === best.serif).slice(0, 3).map(f => f.name);
            resolve(`FONT_NAME:\n${best.name}\nSIMILAR_FONTS:\n${similar.join(', ')}\nCLASSIFICATION:\n${best.classification}\nWEIGHT:\n${best.weight}\nFEATURES:\n${best.features}\nMOOD:\n${best.mood}\nUSE_CASE:\n${best.useCase}\nFREE_ALTERNATIVE:\n${best.free}`);
        };
        img.src = dataUrl;
    });
}

function showResults(text, imageSrc, mode) {
    const results = document.getElementById('results');
    const get = (key) => {
        const regex = new RegExp(key + ':\\s*\\n?(.+)', 'i');
        const match = text.match(regex);
        return match ? match[1].trim() : '';
    };

    const fontName = get('FONT_NAME');
    const similar = get('SIMILAR_FONTS');
    const classification = get('CLASSIFICATION');
    const weight = get('WEIGHT');
    const features = get('FEATURES');
    const mood = get('MOOD');
    const useCase = get('USE_CASE');
    const freeAlt = get('FREE_ALTERNATIVE');

    const classColors = {
        '세리프': '#D4A574', '산세리프': '#888', '슬래브세리프': '#D4A574',
        '스크립트': '#C8A2C8', '디스플레이': '#FF69B4', '모노스페이스': '#00FF41'
    };
    const classColor = classColors[classification] || '#3b82f6';

    const similarHtml = similar ? similar.split(',').map(f =>
        `<span class="keyword">${f.trim()}</span>`
    ).join('') : '';

    results.innerHTML = `
        <img src="${imageSrc}" class="result-image">
        <div style="font-size:28px;font-weight:800;color:${classColor}">${fontName}</div>
        ${classification ? `<div style="display:flex;gap:6px;margin:10px 0;">
            <span class="keyword" style="background:${classColor}22;color:${classColor}">${classification}</span>
            ${weight ? `<span class="keyword">${weight}</span>` : ''}
        </div>` : ''}
        ${similar ? `<div class="section-title">유사 폰트</div><div class="keywords">${similarHtml}</div>` : ''}
        ${features ? `<div class="analysis-card"><div class="analysis-label" style="color:#38bdf8;">🔤 폰트 특징</div><div class="analysis-text">${features}</div></div>` : ''}
        ${mood ? `<div class="analysis-card"><div class="analysis-label" style="color:#a78bfa;">✨ 분위기</div><div class="analysis-text">${mood}</div></div>` : ''}
        ${useCase ? `<div class="analysis-card"><div class="analysis-label" style="color:#f472b6;">💡 추천 용도</div><div class="analysis-text">${useCase}</div></div>` : ''}
        ${freeAlt ? `<div class="analysis-card"><div class="analysis-label" style="color:#4ade80;">🆓 무료 대안</div><div class="analysis-text">${freeAlt}</div></div>` : ''}
        <div style="text-align:center;margin-top:12px;font-size:11px;color:${mode === 'ai' ? '#4ade80' : '#f59e0b'};">
            ${mode === 'ai' ? '✓ AI 분석 (Gemini)' : '⚡ 로컬 분석 (오프라인)'}
        </div>
        <button class="retry-btn" id="retryBtn">다른 이미지 분석하기</button>
    `;
    results.classList.add('visible');

    document.getElementById('retryBtn').addEventListener('click', () => {
        results.classList.remove('visible');
        uploadArea.classList.remove('has-image');
        document.getElementById('uploadContent').innerHTML =
            `<div class="upload-icon">🔍</div><div class="upload-text"><strong>이미지를 드래그</strong>하거나 클릭해서 업로드</div>`;
    });
}
</script>

</body>
</html>
