<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Catcher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 20px;
        }

        h1 { font-size: 42px; font-weight: 800; margin-bottom: 6px; }
        .subtitle { color: #666; font-size: 15px; margin-bottom: 40px; }

        .upload-area {
            width: 100%; max-width: 520px;
            border: 2px dashed #333; border-radius: 16px;
            padding: 60px 20px; text-align: center;
            cursor: pointer; transition: all 0.2s; margin-bottom: 16px;
        }
        .upload-area:hover, .upload-area.dragover { border-color: #3b82f6; background: #111; }
        .upload-area.has-image { padding: 16px; border-style: solid; border-color: #2a2a2a; }
        .upload-icon { font-size: 48px; margin-bottom: 12px; }
        .upload-text { color: #888; font-size: 15px; }
        .upload-text strong { color: #ccc; }
        .upload-preview { max-width: 100%; max-height: 260px; border-radius: 10px; }
        .change-text { color: #555; font-size: 12px; margin-top: 8px; }
        #fileInput { display: none; }

        .step-section { display: none; width: 100%; max-width: 520px; margin-top: 20px; }
        .step-section.visible { display: block; }

        .step-card {
            background: #151515; border: 1px solid #222;
            border-radius: 12px; padding: 20px; margin-bottom: 16px;
        }
        .step-label { font-size: 13px; color: #888; margin-bottom: 8px; }
        .step-input {
            width: 100%; background: #0f0f0f; border: 1px solid #333;
            border-radius: 8px; padding: 12px; color: #fff;
            font-size: 18px; outline: none; text-align: center;
        }
        .step-input:focus { border-color: #3b82f6; }
        .step-hint { font-size: 11px; color: #555; margin-top: 6px; }

        .action-btn {
            display: block; width: 100%; padding: 14px;
            background: #3b82f6; color: white; border: none;
            border-radius: 12px; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: opacity 0.2s;
        }
        .action-btn:hover { opacity: 0.85; }
        .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .loading { display: none; text-align: center; margin: 20px 0; }
        .loading.visible { display: block; }
        .loading-text { color: #3b82f6; font-size: 14px; margin-bottom: 8px; }
        .loading-detail { color: #555; font-size: 12px; margin-bottom: 8px; }
        .progress-bar { width: 320px; height: 4px; background: #1a1a1a; border-radius: 2px; margin: 0 auto; overflow: hidden; }
        .progress-fill-anim { width: 80px; height: 100%; background: #3b82f6; border-radius: 2px; animation: slide 1s ease-in-out infinite; }
        .progress-fill-real { height: 100%; background: #3b82f6; border-radius: 2px; transition: width 0.3s; }
        @keyframes slide { 0% { transform: translateX(-80px); } 100% { transform: translateX(320px); } }

        .results { display: none; width: 100%; max-width: 520px; }
        .results.visible { display: block; }

        .result-rank {
            background: #151515; border: 1px solid #222;
            border-radius: 12px; padding: 16px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 16px;
        }
        .rank-number { font-size: 24px; font-weight: 800; color: #333; width: 36px; text-align: center; }
        .rank-number.top { color: #3b82f6; }
        .rank-info { flex: 1; }
        .rank-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .rank-sample { font-size: 20px; color: #aaa; margin-bottom: 4px; }
        .rank-score { font-size: 12px; color: #555; }
        .rank-bar { width: 100%; height: 4px; background: #222; border-radius: 2px; margin-top: 4px; }
        .rank-bar-fill { height: 100%; background: #3b82f6; border-radius: 2px; }

        .section-title { font-size: 13px; font-weight: 700; color: #555; margin: 18px 0 10px; text-transform: uppercase; letter-spacing: 1px; }

        .analysis-card {
            background: #151515; border: 1px solid #222;
            border-radius: 12px; padding: 16px; margin-bottom: 10px;
        }
        .analysis-label { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .analysis-text { font-size: 14px; color: #aaa; line-height: 1.7; }

        .retry-btn {
            display: block; width: 100%; padding: 14px;
            background: #1a1a1a; color: #888; border: 1px solid #2a2a2a;
            border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; margin-top: 16px; transition: all 0.2s;
        }
        .retry-btn:hover { background: #222; color: #fff; }

        .footer { color: #333; font-size: 11px; margin-top: 48px; }

        @media (max-width: 500px) { h1 { font-size: 32px; } }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>

<h1>Font Catcher</h1>
<p class="subtitle">이미지를 올리면 폰트를 찾아드려요</p>

<div class="upload-area" id="uploadArea">
    <div id="uploadContent">
        <div class="upload-icon">🔍</div>
        <div class="upload-text"><strong>이미지를 드래그</strong>하거나 클릭해서 업로드</div>
    </div>
</div>
<input type="file" id="fileInput" accept="image/*">

<!-- 텍스트 입력 단계 -->
<div class="step-section" id="stepSection">
    <div class="step-card">
        <div class="step-label">이미지에 적힌 텍스트를 입력해주세요</div>
        <input type="text" class="step-input" id="textInput" placeholder="예: Hello World">
        <div class="step-hint">정확하게 입력할수록 폰트를 더 잘 찾아요</div>
    </div>
    <button class="action-btn" id="analyzeBtn" disabled>이 텍스트로 폰트 찾기</button>
</div>

<!-- 로딩 -->
<div class="loading" id="loading">
    <div class="loading-text" id="loadingText">폰트를 비교하고 있어요...</div>
    <div class="loading-detail" id="loadingDetail"></div>
    <div class="progress-bar"><div class="progress-fill-real" id="progressBar" style="width:0%"></div></div>
</div>

<!-- 결과 -->
<div class="results" id="results"></div>

<div class="footer">Font Catcher · 최정윤 · 국민대 시각디자인</div>

<script>
// ===== Google Fonts 전체 목록 (API로 로드) =====
let GOOGLE_FONTS = [];

const CATEGORY_MAP = {
    'sans-serif': '산세리프',
    'serif': '세리프',
    'display': '디스플레이',
    'handwriting': '스크립트',
    'monospace': '모노스페이스'
};

async function fetchGoogleFontsList() {
    try {
        const resp = await fetch('https://www.googleapis.com/webfonts/v1/webfonts?key=AIzaSyB1IaoTbCq3KK1dJiDvPNKPkN8wetQh8oE&sort=popularity');
        const data = await resp.json();
        GOOGLE_FONTS = data.items.map(f => ({
            name: f.family,
            category: CATEGORY_MAP[f.category] || f.category,
            css: f.family.replace(/ /g, '+')
        }));
        return GOOGLE_FONTS;
    } catch (e) {
        console.warn('Google Fonts API 실패, 기본 목록 사용');
        return [];
    }
}

// ===== 폰트 로드 (배치로) =====
let fontsLoaded = false;
async function loadGoogleFonts(maxFonts, onProgress) {
    if (fontsLoaded) return;

    const fonts = GOOGLE_FONTS.slice(0, maxFonts);
    const BATCH = 50;

    for (let i = 0; i < fonts.length; i += BATCH) {
        const batch = fonts.slice(i, i + BATCH);
        const families = batch.map(f => f.css + ':wght@400').join('&family=');
        const link = document.createElement('link');
        link.href = `https://fonts.googleapis.com/css2?family=${families}&display=swap`;
        link.rel = 'stylesheet';
        document.head.appendChild(link);

        if (onProgress) onProgress(Math.min(i + BATCH, fonts.length), fonts.length);
        await new Promise(r => setTimeout(r, 300));
    }

    await new Promise(r => setTimeout(r, 1500)); // 마지막 배치 로드 대기
    fontsLoaded = true;
}

// ===== UI =====
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleImage(e.target.files[0]); });
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => {
    e.preventDefault(); uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleImage(file);
});
document.addEventListener('paste', (e) => {
    for (const item of e.clipboardData.items) {
        if (item.type.startsWith('image/')) { handleImage(item.getAsFile()); break; }
    }
});

let uploadedImageSrc = null;

function handleImage(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
        uploadedImageSrc = e.target.result;
        uploadArea.classList.add('has-image');
        document.getElementById('uploadContent').innerHTML =
            `<img src="${uploadedImageSrc}" class="upload-preview"><div class="change-text">클릭하여 변경</div>`;
        document.getElementById('stepSection').classList.add('visible');
        document.getElementById('results').classList.remove('visible');
        document.getElementById('textInput').focus();
    };
    reader.readAsDataURL(file);
}

// 텍스트 입력 → 버튼 활성화
document.getElementById('textInput').addEventListener('input', (e) => {
    document.getElementById('analyzeBtn').disabled = e.target.value.trim().length === 0;
});
document.getElementById('textInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.value.trim()) document.getElementById('analyzeBtn').click();
});
document.getElementById('analyzeBtn').addEventListener('click', startAnalysis);

// ===== 픽셀 비교 분석 =====
async function startAnalysis() {
    const text = document.getElementById('textInput').value.trim();
    if (!text) return;

    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const stepSection = document.getElementById('stepSection');
    stepSection.classList.remove('visible');
    loading.classList.add('visible');
    results.classList.remove('visible');

    // 폰트 목록 로드
    if (GOOGLE_FONTS.length === 0) {
        document.getElementById('loadingText').textContent = 'Google Fonts 목록 가져오는 중...';
        await fetchGoogleFontsList();
    }

    const MAX_FONTS = Math.min(GOOGLE_FONTS.length, 1700);
    document.getElementById('loadingText').textContent = '폰트를 불러오는 중...';
    document.getElementById('loadingDetail').textContent = `${MAX_FONTS}개 폰트 로딩`;
    await loadGoogleFonts(MAX_FONTS, (loaded, total) => {
        document.getElementById('loadingDetail').textContent = `${loaded}/${total}개 폰트 로딩`;
        document.getElementById('progressBar').style.width = (loaded / total * 30) + '%';
    });

    document.getElementById('loadingText').textContent = '이미지와 비교하는 중...';

    // 원본 이미지에서 텍스트 영역 렌더링
    const originalPixels = await getImagePixels(uploadedImageSrc);

    // 각 폰트로 렌더링 후 비교
    const scores = [];
    const fontsToCompare = GOOGLE_FONTS.slice(0, MAX_FONTS);
    const total = fontsToCompare.length;

    for (let i = 0; i < total; i++) {
        const font = fontsToCompare[i];
        const similarity = compareWithFont(originalPixels, text, font.name);
        scores.push({ ...font, score: similarity });

        if (i % 20 === 0) {
            const pct = 30 + Math.round((i / total) * 70);
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('loadingDetail').textContent = `${i}/${total} 폰트 비교 중...`;
            await new Promise(r => setTimeout(r, 0)); // UI 업데이트
        }
    }

    document.getElementById('progressBar').style.width = '100%';

    scores.sort((a, b) => b.score - a.score);
    loading.classList.remove('visible');
    showResults(scores.slice(0, 5), text, total);
}

function getImagePixels(dataUrl) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const size = 200;
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');

            // 이미지를 정사각형으로 맞춤
            const scale = Math.min(size / img.width, size / img.height);
            const w = img.width * scale, h = img.height * scale;
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, size, size);
            ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);

            // 이진화
            const imageData = ctx.getImageData(0, 0, size, size);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                const val = gray > 128 ? 255 : 0;
                data[i] = data[i+1] = data[i+2] = val;
            }
            ctx.putImageData(imageData, 0, 0);

            resolve({ canvas, ctx, size });
        };
        img.src = dataUrl;
    });
}

function compareWithFont(originalPixels, text, fontName) {
    const size = originalPixels.size;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');

    // 폰트로 렌더링
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // 텍스트 크기 자동 조절
    let fontSize = 60;
    ctx.font = `${fontSize}px "${fontName}"`;
    let metrics = ctx.measureText(text);
    while (metrics.width > size * 0.85 && fontSize > 12) {
        fontSize -= 2;
        ctx.font = `${fontSize}px "${fontName}"`;
        metrics = ctx.measureText(text);
    }

    ctx.fillText(text, size / 2, size / 2);

    // 이진화
    const imageData = ctx.getImageData(0, 0, size, size);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        data[i] = data[i+1] = data[i+2] = gray > 128 ? 255 : 0;
    }

    // 원본과 비교
    const origData = originalPixels.ctx.getImageData(0, 0, size, size).data;
    let match = 0, totalPx = 0;

    for (let i = 0; i < data.length; i += 4) {
        // 검은 픽셀(글자)만 비교
        if (origData[i] === 0 || data[i] === 0) {
            totalPx++;
            if (origData[i] === data[i]) match++;
        }
    }

    return totalPx > 0 ? (match / totalPx) * 100 : 0;
}

function showResults(topFonts, text, total) {
    const results = document.getElementById('results');

    let ranksHtml = '';
    topFonts.forEach((font, i) => {
        const isTop = i === 0;
        ranksHtml += `
            <div class="result-rank">
                <div class="rank-number ${isTop ? 'top' : ''}">${i + 1}</div>
                <div class="rank-info">
                    <div class="rank-name" style="${isTop ? 'color:#3b82f6;font-size:18px;' : ''}">${font.name}</div>
                    <div class="rank-sample" style="font-family:'${font.name}',sans-serif;">${text}</div>
                    <div class="rank-score">유사도 ${font.score.toFixed(1)}% · ${font.category}</div>
                    <div class="rank-bar"><div class="rank-bar-fill" style="width:${font.score}%;${isTop ? 'background:#3b82f6;' : 'background:#333;'}"></div></div>
                </div>
            </div>`;
    });

    const topFont = topFonts[0];
    const topScore = topFont.score;
    let matchMsg, matchColor;
    if (topScore >= 95) {
        matchMsg = "✅ 정확히 이 폰트일 가능성이 높아요";
        matchColor = "#4ade80";
    } else if (topScore >= 70) {
        matchMsg = "🔎 비슷한 폰트예요 (유료 폰트일 수 있어요)";
        matchColor = "#f59e0b";
    } else {
        matchMsg = "💡 참고용이에요 (정확한 폰트는 아닐 수 있어요)";
        matchColor = "#ef4444";
    }

    results.innerHTML = `
        <div style="background:${matchColor}15;border:1px solid ${matchColor}33;border-radius:10px;padding:12px 16px;margin-bottom:16px;text-align:center;">
            <div style="font-size:14px;color:${matchColor};font-weight:600;">${matchMsg}</div>
        </div>

        <div class="section-title">가장 유사한 폰트 (${total}개 비교)</div>
        ${ranksHtml}

        <div class="analysis-card" style="margin-top:16px;">
            <div class="analysis-label" style="color:#4ade80;">🆓 모두 무료</div>
            <div class="analysis-text">위 폰트들은 모두 Google Fonts에서 무료로 다운로드할 수 있어요.<br>
            <a href="https://fonts.google.com/specimen/${topFont.css}" target="_blank" style="color:#3b82f6;">→ ${topFont.name} 다운로드</a></div>
        </div>

        <button class="retry-btn" id="retryBtn">다른 이미지 분석하기</button>
    `;
    results.classList.add('visible');

    document.getElementById('retryBtn').addEventListener('click', () => {
        results.classList.remove('visible');
        uploadArea.classList.remove('has-image');
        document.getElementById('uploadContent').innerHTML =
            `<div class="upload-icon">🔍</div><div class="upload-text"><strong>이미지를 드래그</strong>하거나 클릭해서 업로드</div>`;
        document.getElementById('stepSection').classList.remove('visible');
        document.getElementById('textInput').value = '';
    });
}
</script>

</body>
</html>
